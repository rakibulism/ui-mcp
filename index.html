<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Shots Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: #121a31;
        --text: #e8edff;
        --muted: #9cabd6;
        --accent: #86a8ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: linear-gradient(180deg, #0b1020, #101936);
        color: var(--text);
      }
      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }
      h1 { margin: 0 0 8px; font-size: clamp(1.6rem, 2.5vw, 2.2rem); }
      p { margin: 0 0 24px; color: var(--muted); }
      .grid {
        display: grid;
        gap: 18px;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      }
      .card {
        background: color-mix(in srgb, var(--panel), #000 8%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        overflow: hidden;
      }
      .card img {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        display: block;
        background: #0f1730;
      }
      .meta { padding: 12px; }
      .meta h2 { margin: 0 0 4px; font-size: 0.98rem; }
      .meta small { color: var(--accent); }
    </style>
  </head>
  <body>
    <main>
      <h1>Social Shots Public Preview</h1>
      <p>
        This page is intentionally lightweight so opening <code>index.html</code> in a browser always shows a visual
        preview without a build step.
      </p>
      <section class="grid" id="preview-grid" aria-label="Preview gallery"></section>
    </main>

    <script>
      const previews = [
        {
          title: "Trior — Task Management Dashboard",
          source: "Dribbble Shot",
          path: "Dribbble Shot/Trior — Task Management Dashboard/1. Wild Zoom.png"
        },
        {
          title: "Fireseo - AI SEO auditing tool",
          source: "Dribbble Shot",
          path: "Dribbble Shot/Fireseo - Al SEO auditing tool/1. Wild Zoom.png"
        },
        {
          title: "Buzzd – Social Media Performance",
          source: "Instagram Carousel 1/1",
          path: "Instagram Carousel Saas Shot - 1/1 - Insta/Buzzd – Social Media Performance Dashboard/Instagram post - 1.png"
        },
        {
          title: "RevPilot - MRR Churn Dashboard",
          source: "Instagram Carousel 1/2",
          path: "Instagram Carousel Saas Shot - 1/2 - Insta/RevPilot - MRR Churn Dashboard/Instagram post - 1.png"
        }
      ];

      const grid = document.getElementById("preview-grid");
      previews.forEach((item) => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <img src="${encodeURI(item.path)}" alt="${item.title} preview" loading="lazy" />
          <div class="meta">
            <h2>${item.title}</h2>
            <small>${item.source}</small>
          </div>
        `;
        grid.appendChild(card);
      });
    </script>
  </body>
</html>
