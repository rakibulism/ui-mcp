const SUMMARY={"Dribbble Shot": 146, "Instagram Carousel Saas Shot - 1": 124};
const searchEl=document.getElementById('search');
const categoryEl=document.getElementById('category');
const statsEl=document.getElementById('stats');
const grid=document.getElementById('grid');
const empty=document.getElementById('empty');

function renderStats() {
  const total=IMAGES.length;
  const cats=Object.entries(SUMMARY).sort((a,b)=>a[0].localeCompare(b[0]));
  statsEl.innerHTML=`<span class="chip">Total images: <strong>${total}</strong></span>`+
    cats.map(([n,c])=>`<span class="chip">${n}: <strong>${c}</strong></span>`).join('');
}

function initCategory() {
  const cats=['All categories', ...Object.keys(SUMMARY).sort((a,b)=>a.localeCompare(b))];
  categoryEl.innerHTML=cats.map(c=>`<option value="${c}">${c}</option>`).join('');
}

function matches(img,q,cat) {
  const qq=q.trim().toLowerCase();
  const inCat = cat==='All categories' || img.top===cat;
  if(!inCat) return false;
  if(!qq) return true;
  return (img.path+" "+img.project+" "+img.name).toLowerCase().includes(qq);
}

function render() {
  const q=searchEl.value;
  const cat=categoryEl.value;
  const filtered=IMAGES.filter(i=>matches(i,q,cat));
  grid.innerHTML=filtered.map(i=>`<article class="card"><a href="${i.path}" target="_blank" rel="noopener noreferrer"><img loading="lazy" class="thumb" src="${i.path}" alt="${i.name}"><div class="meta"><div class="name">${i.name}</div><div class="path">${i.project}</div></div></a></article>`).join('');
  empty.hidden=filtered.length!==0;
}

initCategory();
renderStats();
render();
searchEl.addEventListener('input',render);
categoryEl.addEventListener('change',render);
</script>
