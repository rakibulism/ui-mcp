    <style>
      :root { color-scheme: dark; --text:#e8edff; --muted:#9cabd6; --panel:#121a31; --accent:#86a8ff; }
      * { box-sizing: border-box; }
      body { margin:0; font-family: Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:linear-gradient(180deg,#0b1020,#101936); color:var(--text); }
      main { max-width:1120px; margin:0 auto; padding:32px 20px 48px; }
      h1 { margin:0 0 8px; font-size:clamp(1.6rem,2.5vw,2.2rem); }
      p { margin:0; color:var(--muted); }
      .stats { margin:12px 0 24px; color:var(--accent); font-weight:600; }
      .grid { display:grid; gap:18px; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); }
      .card { background:color-mix(in srgb,var(--panel),#000 8%); border:1px solid rgba(255,255,255,.1); border-radius:14px; overflow:hidden; }
      .card img { width:100%; aspect-ratio:4/3; object-fit:cover; display:block; background:#0f1730; }
      .meta { padding:12px; }
      .meta h2 { margin:0 0 4px; font-size:.96rem; line-height:1.35; }
      .meta small { color:var(--accent); }
    </style>
  </head>
